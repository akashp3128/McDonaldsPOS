name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish McDonaldsPOS.UI/McDonaldsPOS.UI.csproj -c Release -o ./publish --self-contained false

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: McDonaldsPOS-Windows
        path: ./publish/
        retention-days: 30
