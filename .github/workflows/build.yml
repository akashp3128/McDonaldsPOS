name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: McDonaldsPOS-Linux
            runtime: linux-x64
          - os: macos-latest
            artifact_name: McDonaldsPOS-macOS
            runtime: osx-x64
          - os: windows-latest
            artifact_name: McDonaldsPOS-Windows
            runtime: win-x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish McDonaldsPOS.UI/McDonaldsPOS.UI.csproj -c Release -o ./publish -r ${{ matrix.runtime }} --self-contained true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ./publish/
        retention-days: 30
